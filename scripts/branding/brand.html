<!doctype html>
<!--
  Mythic Fishing brand art — icon + splash source.
  Rendered to PNG with headless Edge (see scripts/branding/render.ps1).
  Open with a hash to pick the composition: #icon #fg #bg #splash #splash-dark
-->
<html>
<!-- NOTE: only the composition svgs toggle display; the defs svg must stay
     rendered (zero-size) or its gradients resolve to nothing. -->
<head><meta charset="utf-8"><style>html,body{margin:0;padding:0;background:transparent}svg.comp{display:none}svg.comp.on{display:block}</style></head>
<body>

<!-- ============ shared defs + the mythic fish (720x520 local box) ============ -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f93a3"/>
      <stop offset="1" stop-color="#123c47"/>
    </linearGradient>
    <linearGradient id="seaDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c2f3a"/>
      <stop offset="1" stop-color="#04141a"/>
    </linearGradient>
    <linearGradient id="goldBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7c95c"/>
      <stop offset="1" stop-color="#cd9130"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe9a8" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#ffd97a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffd97a" stop-opacity="0"/>
    </radialGradient>

    <!-- The golden mythic fish, facing right. Local box 0..720 x 0..520. -->
    <g id="fish">
      <!-- forked tail -->
      <path d="M 175 280 L 40 160 L 122 280 L 40 400 Z" fill="#c98d2e"/>
      <!-- fins (bases sit inside the body outline so they read attached) -->
      <path d="M 320 230 L 395 85 L 500 215 Z" fill="#d99b30"/>
      <path d="M 350 390 L 402 474 L 472 384 Z" fill="#d99b30"/>
      <!-- body -->
      <path d="M 150 280 C 250 150, 520 128, 660 248 C 694 277, 694 289, 662 314 C 528 432, 253 416, 150 280 Z" fill="url(#goldBody)"/>
      <!-- low-poly facet highlights -->
      <path d="M 165 280 L 302 192 L 420 298 Z" fill="#ffe08a" opacity="0.55"/>
      <path d="M 302 192 L 420 298 L 558 194 Z" fill="#f7c95c" opacity="0.5"/>
      <path d="M 420 298 L 558 194 L 645 262 Z" fill="#ffd97a" opacity="0.45"/>
      <path d="M 205 328 L 420 402 L 600 318 L 420 336 Z" fill="#8a5f16" opacity="0.3"/>
      <!-- gill line -->
      <path d="M 522 192 C 549 250, 549 312, 517 364" stroke="#b57f23" stroke-width="11" fill="none" opacity="0.65" stroke-linecap="round"/>
      <!-- eye -->
      <circle cx="588" cy="250" r="24" fill="#3a2a08"/>
      <circle cx="596" cy="242" r="8.5" fill="#fff" opacity="0.92"/>
    </g>

    <!-- 4-point sparkle, centered on 0,0 with radius s=1 (scale to size) -->
    <g id="spark">
      <path d="M 0 -1 L 0.22 -0.22 L 1 0 L 0.22 0.22 L 0 1 L -0.22 0.22 L -1 0 L -0.22 -0.22 Z" fill="#ffe9b0"/>
    </g>

    <!-- low-poly wave bands (1024-wide strips, anchored at local y=0) -->
    <g id="waves1024">
      <polygon points="0,10 128,-30 256,12 384,-34 512,10 640,-28 768,12 896,-36 1024,8 1024,340 0,340" fill="#2c6d7c"/>
      <polygon points="0,80 170,44 340,86 512,40 680,86 850,46 1024,80 1024,340 0,340" fill="#3f8fa0"/>
      <polygon points="0,160 200,124 400,166 600,120 800,166 1024,130 1024,340 0,340" fill="#57a7b8"/>
    </g>
  </defs>
</svg>

<!-- ============ #icon : 1024x1024 full app icon ============ -->
<svg id="icon" class="comp" width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="url(#sea)"/>
  <use href="#waves1024" y="690"/>
  <circle cx="512" cy="420" r="400" fill="url(#glow)"/>
  <!-- splash droplets where the tail exits the water -->
  <circle cx="300" cy="640" r="16" fill="#bfe3e0" opacity="0.85"/>
  <circle cx="252" cy="592" r="10" fill="#bfe3e0" opacity="0.7"/>
  <circle cx="345" cy="686" r="9" fill="#bfe3e0" opacity="0.6"/>
  <use href="#fish" transform="rotate(-14 512 420) translate(152 160)"/>
  <use href="#spark" transform="translate(806 240) scale(38)"/>
  <use href="#spark" transform="translate(872 342) scale(22)"/>
  <use href="#spark" transform="translate(206 208) scale(26)"/>
</svg>

<!-- ============ #fg : 1024x1024 adaptive-icon foreground (transparent bg) ============
     Android crops to the center ~66%, so the art stays inside a 660px circle. -->
<svg id="fg" class="comp" width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <circle cx="512" cy="512" r="330" fill="url(#glow)"/>
  <g transform="translate(512 512) scale(0.78) translate(-512 -512)">
    <use href="#fish" transform="rotate(-14 512 512) translate(152 252)"/>
    <use href="#spark" transform="translate(800 330) scale(34)"/>
    <use href="#spark" transform="translate(238 300) scale(24)"/>
  </g>
</svg>

<!-- ============ #bg : 1024x1024 adaptive-icon background ============ -->
<svg id="bg" class="comp" width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="url(#sea)"/>
  <use href="#waves1024" y="690"/>
</svg>

<!-- ============ #splash / #splash-dark : 2732x2732 ============
     Devices center-crop; everything that matters stays in the middle 1200px. -->
<svg id="splash" class="comp" width="2732" height="2732" viewBox="0 0 2732 2732" xmlns="http://www.w3.org/2000/svg">
  <rect width="2732" height="2732" fill="url(#sea)"/>
  <circle cx="1366" cy="1130" r="640" fill="url(#glow)"/>
  <use href="#fish" transform="rotate(-14 1366 1130) translate(1366 1130) scale(1.55) translate(-370 -270)"/>
  <use href="#spark" transform="translate(2010 760) scale(52)"/>
  <use href="#spark" transform="translate(760 800) scale(34)"/>
  <use href="#spark" transform="translate(2080 1370) scale(30)"/>
  <text x="1366" y="1705" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-weight="800" font-size="200" letter-spacing="26" fill="#ffe9b0">MYTHIC</text>
  <text x="1366" y="1850" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-weight="600" font-size="112" letter-spacing="58" fill="#bfe3e0">FISHING</text>
  <rect x="1120" y="1915" width="492" height="7" rx="3.5" fill="#e8b24a" opacity="0.9"/>
  <g transform="translate(0 2390)"><g transform="scale(2.668 1)"><use href="#waves1024"/></g></g>
</svg>

<svg id="splash-dark" class="comp" width="2732" height="2732" viewBox="0 0 2732 2732" xmlns="http://www.w3.org/2000/svg">
  <rect width="2732" height="2732" fill="url(#seaDark)"/>
  <circle cx="1366" cy="1130" r="640" fill="url(#glow)"/>
  <use href="#fish" transform="rotate(-14 1366 1130) translate(1366 1130) scale(1.55) translate(-370 -270)"/>
  <use href="#spark" transform="translate(2010 760) scale(52)"/>
  <use href="#spark" transform="translate(760 800) scale(34)"/>
  <use href="#spark" transform="translate(2080 1370) scale(30)"/>
  <text x="1366" y="1705" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-weight="800" font-size="200" letter-spacing="26" fill="#ffe9b0">MYTHIC</text>
  <text x="1366" y="1850" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-weight="600" font-size="112" letter-spacing="58" fill="#8fb8c4">FISHING</text>
  <rect x="1120" y="1915" width="492" height="7" rx="3.5" fill="#e8b24a" opacity="0.9"/>
  <g transform="translate(0 2390)" opacity="0.5"><g transform="scale(2.668 1)"><use href="#waves1024"/></g></g>
</svg>

<script>
  const id = (location.hash || "#icon").slice(1);
  document.getElementById(id)?.classList.add("on");
</script>
</body>
</html>
